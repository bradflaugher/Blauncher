name: Build and release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLAUNCHER_VERSION_CODE: ${{ github.run_number }}
      BLAUNCHER_VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Restore signing keystore
        if: github.event_name == 'push'
        env:
          BLAUNCHER_KEYSTORE_BASE64: ${{ secrets.BLAUNCHER_KEYSTORE_BASE64 }}
          BLAUNCHER_STORE_PASSWORD: ${{ secrets.BLAUNCHER_STORE_PASSWORD }}
          BLAUNCHER_KEY_ALIAS: ${{ secrets.BLAUNCHER_KEY_ALIAS }}
          BLAUNCHER_KEY_PASSWORD: ${{ secrets.BLAUNCHER_KEY_PASSWORD }}
        run: |
          missing=()
          for variable in BLAUNCHER_KEYSTORE_BASE64 BLAUNCHER_STORE_PASSWORD BLAUNCHER_KEY_ALIAS BLAUNCHER_KEY_PASSWORD; do
            if [ -z "${!variable:-}" ]; then
              missing+=("$variable")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/blauncher-release.jks"
          if ! printf '%s' "$BLAUNCHER_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"; then
            printf 'BLAUNCHER_KEYSTORE_BASE64 is not valid base64\n' >&2
            exit 1
          fi
          if [ ! -s "$keystore_path" ]; then
            printf 'The restored signing keystore is empty\n' >&2
            exit 1
          fi
          printf 'BLAUNCHER_KEYSTORE_PATH=%s\n' "$keystore_path" >> "$GITHUB_ENV"

      - name: Lint, test, and build release APK
        env:
          BLAUNCHER_STORE_PASSWORD: ${{ secrets.BLAUNCHER_STORE_PASSWORD }}
          BLAUNCHER_KEY_ALIAS: ${{ secrets.BLAUNCHER_KEY_ALIAS }}
          BLAUNCHER_KEY_PASSWORD: ${{ secrets.BLAUNCHER_KEY_PASSWORD }}
        run: ./gradlew lint test assembleRelease

      - name: Name signed APK
        if: github.event_name == 'push'
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Blauncher.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: blauncher-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signed APK
        uses: actions/download-artifact@v5
        with:
          name: blauncher-release-${{ github.run_number }}
          path: release-apk

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete latest --cleanup-tag --yes --repo "$GITHUB_REPOSITORY"
          fi
          gh release create latest release-apk/Blauncher.apk \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Blauncher latest" \
            --notes "Latest signed build from commit ${GITHUB_SHA}."

          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json tagName --jq '.[] | select(.tagName | startswith("build-")) | .tagName' |
          while read -r old_tag; do
            gh release delete "$old_tag" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY"
          done
