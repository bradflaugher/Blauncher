name: Build and release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLAUNCHER_VERSION_CODE: ${{ github.run_number }}
      BLAUNCHER_VERSION_NAME: 1.0.${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        if: github.event_name == 'push'
        env:
          BLAUNCHER_KEYSTORE_BASE64: ${{ secrets.BLAUNCHER_KEYSTORE_BASE64 }}
          BLAUNCHER_STORE_PASSWORD: ${{ secrets.BLAUNCHER_STORE_PASSWORD }}
          BLAUNCHER_KEY_ALIAS: ${{ secrets.BLAUNCHER_KEY_ALIAS }}
          BLAUNCHER_KEY_PASSWORD: ${{ secrets.BLAUNCHER_KEY_PASSWORD }}
        run: |
          missing=()
          for variable in BLAUNCHER_KEYSTORE_BASE64 BLAUNCHER_STORE_PASSWORD BLAUNCHER_KEY_ALIAS BLAUNCHER_KEY_PASSWORD; do
            if [ -z "${!variable:-}" ]; then
              missing+=("$variable")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/blauncher-release.jks"
          if ! printf '%s' "$BLAUNCHER_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"; then
            printf 'BLAUNCHER_KEYSTORE_BASE64 is not valid base64\n' >&2
            exit 1
          fi
          if [ ! -s "$keystore_path" ]; then
            printf 'The restored signing keystore is empty\n' >&2
            exit 1
          fi
          printf 'BLAUNCHER_KEYSTORE_PATH=%s\n' "$keystore_path" >> "$GITHUB_ENV"

      - name: Lint, test, and build release APK
        env:
          BLAUNCHER_STORE_PASSWORD: ${{ secrets.BLAUNCHER_STORE_PASSWORD }}
          BLAUNCHER_KEY_ALIAS: ${{ secrets.BLAUNCHER_KEY_ALIAS }}
          BLAUNCHER_KEY_PASSWORD: ${{ secrets.BLAUNCHER_KEY_PASSWORD }}
        run: ./gradlew lint test assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: blauncher-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: blauncher-release-${{ github.run_number }}
          path: release-apk

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-apk/app-release.apk --clobber
          else
            gh release create "$tag" release-apk/app-release.apk \
              --target "$GITHUB_SHA" \
              --title "Blauncher build ${GITHUB_RUN_NUMBER}" \
              --notes "Automated release for commit ${GITHUB_SHA}."
          fi
